{% extends "students/base.html" %}
{% block title %}Сұрақ қосу{% endblock %}

{% block content %}
<div class="mb-3">
  <h3 class="mb-0">Сұрақ қосу</h3>
  <div class="text-muted">Тест: {{ quiz.title }}</div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Сұрақ мәтіні</label>
        {{ form.text }}
      </div>
      <div class="mb-3">
        <label class="form-label">Ұпай</label>
        {{ form.points }}
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-success" type="submit">Қосу</button>
        <a class="btn btn-outline-secondary" href="{% url 'quiz_edit' quiz.id %}">Артқа</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
