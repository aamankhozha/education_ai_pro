{% load static %}
<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кіру | Білім сапасы AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-2 mb-3">
              <div class="logo-dot"></div>
              <div>
                <div class="fw-bold">Білім сапасын талдау</div>
                <div class="text-muted small">AI веб-жүйе (Django + TensorFlow)</div>
              </div>
            </div>

            {% if form.errors %}
              <div class="alert alert-danger py-2 small">Логин немесе құпиясөз қате.</div>
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label">Пайдаланушы аты</label>
                <input class="form-control" type="text" name="username" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Құпиясөз</label>
                <input class="form-control" type="password" name="password" required>
              </div>
              <button class="btn btn-primary w-100">Кіру</button>
            </form>

            <div class="text-muted small mt-3">
              Әкімші ашу үшін: <code>python manage.py createsuperuser</code>
            </div>
          </div>
        </div>

        <div class="text-center text-muted small mt-3">
          © {{ now|date:"Y" }} Education AI
        </div>
      </div>
    </div>
  </div>
</body>
</html>
